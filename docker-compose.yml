services:
  postgres:
    image: postgres:16-alpine
    container_name: retail_analytics_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d retail"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
